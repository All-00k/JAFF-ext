<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JAFF Autofiller</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">⚡</div>
        <h2>JAFF Autofill</h2>
    </div>

    <div class="section">
        <h4>USER PROFILE</h4>
        <p>Fill your details once and we will autofill forms automatically.</p>
    </div>

    <!-- First Name -->
    <label>First Name</label>
    <div class="input-box">
        <span>👤</span>
        <input id="firstName" placeholder="firstName">
    </div>

    <!-- Last Name -->
    <label>Last Name</label>
    <div class="input-box">
        <span>👤</span>
        <input id="lastName" placeholder="lastName">
    </div>

    <!-- Full Name -->
    <label>Full Name</label>
    <div class="input-box">
        <span>👤</span>
        <input id="fullName" placeholder="fullName">
    </div>

    <!-- Email -->
    <label>Email</label>
    <div class="input-box">
        <span>✉</span>
        <input id="email" placeholder="your@mail">
    </div>

    <!-- Phone -->
    <label>Phone</label>
    <div class="input-box">
        <span>📱</span>
        <input id="phone" placeholder="----------">
    </div>

    <!-- Roll Number -->
    <label>Roll Number</label>
    <div class="input-box">
        <span>🎓</span>
        <input id="rollNumber" placeholder="roll Number">
    </div>

    <!-- ERP -->
    <label>ERP</label>
    <div class="input-box">
        <span>🆔</span>
        <input id="erp" placeholder="ERP ID">
    </div>

    <!-- Section -->
    <label>Section</label>
    <div class="input-box">
        <span>📘</span>
        <input id="section" placeholder="CSE-A">
    </div>

    <!-- Branch -->
    <label>Branch</label>
    <div class="input-box">
        <span>🏫</span>
        <input id="branch" placeholder="CSE/DS">
    </div>

    <!-- Address -->
    <label>Address</label>
    <textarea id="address" placeholder="Enter your address"></textarea>

    <button id="save">Save Profile</button>

    <div class="info">
        ℹ Your data stays inside your browser. It is never sent anywhere.
    </div>

    <div class="footer">
        Version 2.1 • Built with ☮
    </div>

</div>

<script src="popup.js"></script>

</body>
</html>
