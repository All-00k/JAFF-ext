<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Autofill</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">⚡</div>
        <h2>Smart Autofill</h2>
    </div>

    <div class="section">
        <h4>USER PROFILE</h4>
        <p>Fill your details once and we will autofill forms automatically.</p>
    </div>

    <label>Name</label>
    <div class="input-box">
        <span>👤</span>
        <input id="fullName" placeholder="John Doe">
    </div>

    <label>Email</label>
    <div class="input-box">
        <span>✉</span>
        <input id="email" placeholder="john@example.com">
    </div>

    <label>Roll Number</label>
    <div class="input-box">
        <span>🎓</span>
        <input id="rollNumber" placeholder="2201040123">
    </div>

    <label>Branch</label>
    <div class="input-box">
        <span>🏫</span>
        <input id="branch" placeholder="Computer Science">
    </div>

    <label>Address</label>
    <textarea id="address" placeholder="Enter your address"></textarea>

    <button id="save">Save Profile</button>

    <div class="info">
        ℹ Your data stays inside your browser. It is never sent anywhere.
    </div>

    <div class="footer">
        Version 1.0 • Built by You 🚀
    </div>

</div>

<script src="popup.js"></script>

</body>
</html>
